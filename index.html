<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DevToolkit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">

<h1 class="text-2xl font-bold mb-4">DevToolkit（简化版）</h1>

<textarea id="input" class="w-full p-3 border rounded mb-3" placeholder="输入内容"></textarea>

<div class="flex gap-2 mb-3">
  <button onclick="b64e()" class="bg-blue-500 text-white px-3 py-1 rounded">Base64编码</button>
  <button onclick="b64d()" class="bg-green-500 text-white px-3 py-1 rounded">Base64解码</button>
</div>

<textarea id="output" class="w-full p-3 border rounded" placeholder="输出结果"></textarea>

<script>
function b64e() {
  const text = document.getElementById("input").value;
  document.getElementById("output").value = btoa(unescape(encodeURIComponent(text)));
}

function b64d() {
  const text = document.getElementById("input").value;
  try {
    document.getElementById("output").value = decodeURIComponent(escape(atob(text)));
  } catch {
    alert("解码失败");
  }
}
</script>

</body>
</html>
